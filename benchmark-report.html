  <title>Comparacao dos algoritmos</title>

    :root {

      background: #f4f6f8;
      color: #17202a;
    }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 32px 20px; }
    main { width: min(1180px, 100%); margin: 0 auto; }
    h1 { margin: 0 0 6px; font-size: clamp(1.6rem, 4vw, 2.4rem); }
    .subtitle { margin: 0 0 24px; color: #5d6d7e; }
    .controls, .panel {
      background: #fff;
      border: 1px solid #dfe6e9;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(23, 32, 42, .06);
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      padding: 18px;
      margin-bottom: 18px;
    }
    label { display: grid; gap: 6px; min-width: min(260px, 100%); font-size: .85rem; font-weight: 700; }
    select {
      padding: 10px 12px;
      border: 1px solid #bdc3c7;
      border-radius: 8px;
      background: #fff;
      color: inherit;
      font: inherit;
    }
    .panel { padding: 22px; overflow-x: auto; }
    #chart { display: block; min-width: 720px; width: 100%; height: 480px; }
    .summary { margin: 16px 2px 0; color: #5d6d7e; font-size: .9rem; }
    .legend { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 16px; font-size: .85rem; }
    .legend span { display: inline-flex; align-items: center; gap: 6px; }
    .swatch { width: 11px; height: 11px; border-radius: 3px; }
  </style>
</head>

    const colors = {
      BLIND: "#2874a6",
      HEURISTIC: "#ca6f1e",
      RESEARCHED: "#239b56"
    };
    const labels = {
      elapsedMs: "Tempo medio (ms)",
      visitedNodes: "Nos visitados",
      expandedNodes: "Nos expandidos",
      solutionDepth: "Profundidade da solucao",
      pathCost: "Custo do caminho",
      qualityRatio: "Razao de qualidade",
      memoryKb: "Variacao de memoria (KB)"
    };
    const scenarioSelect = document.querySelector("#scenario");
    const metricSelect = document.querySelector("#metric");
    const scenarios = [...new Set(results.map(result => result.scenario))];
    scenarioSelect.append(new Option("Todos os cenarios", "__ALL__"));
    scenarios.forEach(scenario => scenarioSelect.append(new Option(scenario, scenario)));

    function aggregate() {
      const scenario = scenarioSelect.value;
      const metric = metricSelect.value;
      const selected = results.filter(result =>
        result.status === "OK" &&
        (scenario === "__ALL__" || result.scenario === scenario) &&
        result[metric] !== null &&
        Number.isFinite(result[metric]) &&
        result[metric] >= 0
      );
      const groups = new Map();
      selected.forEach(result => {
        const group = groups.get(result.algorithm) ?? {
          name: result.algorithm,
          category: result.category,
          total: 0,
          count: 0
        };
        group.total += result[metric];
        group.count++;
        groups.set(result.algorithm, group);
      });
      return [...groups.values()].map(group => ({
        ...group,
        value: group.total / group.count
      }));
    }

    function svgElement(name, attributes = {}) {
      const element = document.createElementNS("http://www.w3.org/2000/svg", name);
      Object.entries(attributes).forEach(([key, value]) => element.setAttribute(key, value));
      return element;
    }

    function formatValue(value) {
      if (value >= 1000) return value.toLocaleString("pt-BR", { maximumFractionDigits: 1 });
      if (value >= 10) return value.toLocaleString("pt-BR", { maximumFractionDigits: 2 });
      return value.toLocaleString("pt-BR", { maximumFractionDigits: 4 });
    }

    function render() {
      const data = aggregate();
      const svg = document.querySelector("#chart");
      const width = Math.max(720, svg.clientWidth || 720);
      const height = 480;
      const margin = { top: 38, right: 24, bottom: 105, left: 82 };
      const plotWidth = width - margin.left - margin.right;
      const plotHeight = height - margin.top - margin.bottom;
      const max = Math.max(...data.map(item => item.value), 1);
      svg.replaceChildren();
      svg.setAttribute("viewBox", `0 0 ${width} ${height}`);

      for (let tick = 0; tick <= 5; tick++) {
        const value = max * tick / 5;
        const y = margin.top + plotHeight - plotHeight * tick / 5;
        svg.append(svgElement("line", {
          x1: margin.left, y1: y, x2: width - margin.right, y2: y,
          stroke: "#e5e8e8", "stroke-width": 1
        }));
        const label = svgElement("text", {
          x: margin.left - 10, y: y + 4, "text-anchor": "end",
          fill: "#5d6d7e", "font-size": 12
        });
        label.textContent = formatValue(value);
        svg.append(label);
      }

      const slot = plotWidth / Math.max(data.length, 1);
      const barWidth = Math.min(72, slot * .62);
      data.forEach((item, index) => {
        const barHeight = item.value / max * plotHeight;
        const x = margin.left + slot * index + (slot - barWidth) / 2;
        const y = margin.top + plotHeight - barHeight;
        const bar = svgElement("rect", {
          x, y, width: barWidth, height: Math.max(barHeight, 1),
          rx: 5, fill: colors[item.category] ?? "#7f8c8d"
        });
        const title = svgElement("title");
        title.textContent = `${item.name}: ${formatValue(item.value)}`;
        bar.append(title);
        svg.append(bar);

        const value = svgElement("text", {
          x: x + barWidth / 2, y: Math.max(y - 8, 16), "text-anchor": "middle",
          fill: "#17202a", "font-size": 12, "font-weight": 700
        });
        value.textContent = formatValue(item.value);
        svg.append(value);

        const name = svgElement("text", {
          x: x + barWidth / 2, y: margin.top + plotHeight + 18,
          "text-anchor": "end", fill: "#34495e", "font-size": 12,
          transform: `rotate(-35 ${x + barWidth / 2} ${margin.top + plotHeight + 18})`
        });
        name.textContent = item.name;
        svg.append(name);
      });

      const axisTitle = svgElement("text", {
        x: 18, y: margin.top + plotHeight / 2, "text-anchor": "middle",
        fill: "#34495e", "font-size": 13, "font-weight": 700,
        transform: `rotate(-90 18 ${margin.top + plotHeight / 2})`
      });
      axisTitle.textContent = labels[metricSelect.value];
      svg.append(axisTitle);

      const successful = results.filter(result => result.status === "OK").length;
      const failed = results.length - successful;
      document.querySelector("#summary").textContent =
        `${results.length} execucoes registradas; ${successful} concluidas com sucesso; ${failed} falhas.`;
    }

    const categories = [...new Set(results.map(result => result.category))];
    document.querySelector("#legend").replaceChildren(...categories.map(category => {
      const item = document.createElement("span");
      const swatch = document.createElement("i");
      swatch.className = "swatch";
      swatch.style.background = colors[category] ?? "#7f8c8d";
      item.append(swatch, document.createTextNode(category));
      return item;
    }));
    scenarioSelect.addEventListener("change", render);
    metricSelect.addEventListener("change", render);
    window.addEventListener("resize", render);
    render();
  </script>
